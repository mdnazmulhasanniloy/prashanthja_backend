services:
  app:
    image: nazmulhasn/prashanthja_app:latest
    container_name: prashanthja_app
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_HOST=prashanthja_redis
      - REDIS_PORT=6379
    ports:
      - '2000:2000'
      - '2005:2005'
    depends_on:
      - redis
    # command: ['node', 'dist/server.js']
    command: null

  redis:
    image: redis:7.2-alpine
    container_name: prashanthja_redis
    expose:
       - 6379
    volumes:
      - redis-data:/data
    restart: always
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - app

volumes:
  redis-data:
